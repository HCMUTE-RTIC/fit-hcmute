# ==============================================================================
# MÔI TRƯỜNG MÁY CHỦ SẢN PHẨM (PRODUCTION DEPLOYMENT) - SETUP SERVER TRƯỜNG
# ==============================================================================
# BẢO MẬT: File này Kín Cổng Cao Tường. Không ai bên ngoài quét được Port
# của DB hoặc Redis. Tất cả lưu lượng đi trỏ từ Cổng HTTPS 443 -> NGINX -> Nội bộ.
# Lệnh chạy: docker-compose -f docker-compose.prod.yml up -d

services:
  # 1. POSTGRES SQL (DB Kín)
  postgres_prod:
    image: postgres:16-alpine
    container_name: p_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-SYS_ADMIN_HCMUTE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-VERY_Sc3cr3t_P@ssw0rd}
      POSTGRES_DB: ${POSTGRES_DB:-fit_25years_prod}
    # [QUAN TRỌNG] : Bỏ trắng 'ports'. DB chỉ giao tiếp nội mạng.
    expose:
      - 5432
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - fit_hcmute_prod_network

  # 2. REDIS (Caching Kín)
  redis_prod:
    image: redis:7-alpine
    container_name: p_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass PROD_REDIS_s3cx_xxyy
    # [QUAN TRỌNG] : Bỏ trắng 'ports'. Redis chỉ giao tiếp nội mạng Backend.
    expose:
      - 6379
    volumes:
      - redis_data_prod:/data
    networks:
      - fit_hcmute_prod_network

  # 3. MINIO S3 (Tệp tin Ảnh Web)
  minio_prod:
    image: minio/minio:latest
    container_name: p_minio_prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-s3_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-s3_admin_Secure_Key}
      MINIO_DOMAIN: "25namminio.hcmutertic.com"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # Cloudflare Tunnel: 25namminio.hcmutertic.com -> localhost:9000
      - "9001:9001" # MinIO Console (chỉ dùng nội bộ, không expose Cloudflare)
    volumes:
      - minio_data_prod:/data
    networks:
      fit_hcmute_prod_network:
        aliases:
          - minio-prod

  # 4. MINIO SCRIPT TẠO BUCKETS (Chạy 1 Lần)
  create_bucket_prod:
    image: minio/mc
    container_name: p_minio_mc_prod
    depends_on:
      - minio_prod
    entrypoint: >
      /bin/sh -c " sleep 10; /usr/bin/mc alias set myminio http://minio-prod:9000 s3_admin s3_admin_Secure_Key; /usr/bin/mc mb myminio/media-fit || true; /usr/bin/mc anonymous set public myminio/media-fit || true; exit 0; "
    networks:
      - fit_hcmute_prod_network

  # 5. BACKEND NESTJS CORE (Application)
  backend_api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: nestjs-backend:latest
    container_name: p_backend
    restart: unless-stopped
    depends_on:
      - postgres_prod
      - redis_prod
      - minio_prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-SYS_ADMIN_HCMUTE}:${POSTGRES_PASSWORD:-VERY_Sc3cr3t_P@ssw0rd}@postgres_prod:5432/${POSTGRES_DB:-fit_25years_prod}?schema=public
      REDIS_HOST: redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-PROD_REDIS_s3cx_xxyy}
      JWT_SECRET: ${JWT_SECRET}
      # MinIO — gọi nội bộ qua container network
      MINIO_ENDPOINT: minio_prod
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-s3_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-s3_admin_Secure_Key}
      MINIO_BUCKET_NAME: media-fit
    ports:
      - "3001:3001" # Cloudflare Tunnel: api25nam.fit.hcmute.edu.vn -> localhost:3001
    networks:
      - fit_hcmute_prod_network

  # 6. FRONTEND NEXTJS (Web App SSR Server)
  frontend_web:
    build:
      context: .
      dockerfile: client/apps/web/Dockerfile
    image: nextjs-frontend:latest
    container_name: p_frontend
    restart: unless-stopped
    depends_on:
      - backend_api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api25nam.fit.hcmute.edu.vn
      # Proxy /media_storage/ -> MinIO nội bộ (thay vì localhost:9000)
      MINIO_INTERNAL_URL: http://minio_prod:9000
    ports:
      - "3000:3000" # Cloudflare Tunnel: 25nam.fit.hcmute.edu.vn -> localhost:3000
    networks:
      - fit_hcmute_prod_network

volumes:
  pg_data_prod:
  redis_data_prod:
  minio_data_prod:


networks:
  fit_hcmute_prod_network:
    driver: bridge
