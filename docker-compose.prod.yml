# ==============================================================================
# MÔI TRƯỜNG MÁY CHỦ SẢN PHẨM (PRODUCTION DEPLOYMENT) - SETUP SERVER TRƯỜNG
# ==============================================================================
# Lệnh chạy: ./deploy.sh
# Hoặc thủ công: docker-compose -f docker-compose.prod.yml --env-file ../env/.env.production up -d --build

services:
  # 1. POSTGRES SQL (DB Kín)
  postgres_prod:
    image: postgres:16-alpine
    container_name: p_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - 5432
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - fit_hcmute_prod_network

  # 2. REDIS (Caching Kín)
  redis_prod:
    image: redis:7-alpine
    container_name: p_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - 6379
    volumes:
      - redis_data_prod:/data
    networks:
      - fit_hcmute_prod_network

  # 3. MINIO S3 (Tệp tin Ảnh Web)
  minio_prod:
    image: minio/minio:latest
    container_name: p_minio_prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: "25namminio.hcmutertic.com"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # Cloudflare Tunnel: 25namminio.hcmutertic.com -> localhost:9000
      - "9001:9001" # MinIO Console (nội bộ, không expose Cloudflare)
    volumes:
      - minio_data_prod:/data
    networks:
      fit_hcmute_prod_network:
        aliases:
          - minio-prod

  # 4. MINIO SCRIPT TẠO BUCKETS (Chạy 1 Lần)
  create_bucket_prod:
    image: minio/mc
    container_name: p_minio_mc_prod
    depends_on:
      - minio_prod
    entrypoint: >
      /bin/sh -c "
        sleep 10;
        /usr/bin/mc alias set myminio http://minio-prod:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME} || true;
        /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET_NAME} || true;
        exit 0;
      "
    networks:
      - fit_hcmute_prod_network

  # 5. BACKEND NESTJS CORE (Application)
  backend_api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: nestjs-backend:latest
    container_name: p_backend
    restart: unless-stopped
    depends_on:
      - postgres_prod
      - redis_prod
      - minio_prod
    env_file:
      - ../env/server/.env.production
    environment:
      NODE_ENV: production
      # Ghi đè các giá trị cần chỉ định cứng cho container network
      MINIO_ENDPOINT: minio_prod
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
    ports:
      - "3001:3001" # Cloudflare Tunnel: api25nam.fit.hcmute.edu.vn -> localhost:3001
    networks:
      - fit_hcmute_prod_network

  # 6. FRONTEND NEXTJS (Web App SSR Server)
  frontend_web:
    build:
      context: .
      dockerfile: client/apps/web/Dockerfile
    image: nextjs-frontend:latest
    container_name: p_frontend
    restart: unless-stopped
    depends_on:
      - backend_api
    env_file:
      - ../env/client/.env.production
    environment:
      NODE_ENV: production
      MINIO_INTERNAL_URL: http://minio_prod:9000
    ports:
      - "3000:3000" # Cloudflare Tunnel: 25nam.fit.hcmute.edu.vn -> localhost:3000
    networks:
      - fit_hcmute_prod_network

volumes:
  pg_data_prod:
  redis_data_prod:
  minio_data_prod:

networks:
  fit_hcmute_prod_network:
    driver: bridge
