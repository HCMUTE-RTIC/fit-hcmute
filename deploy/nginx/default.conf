# CẤU HÌNH NGINX LÀM REVERSE PROXY CHO NESTJS & NEXTJS
# File này sẽ được mount vào container `p_nginx_proxy` tại đường dẫn `/etc/nginx/conf.d/default.conf`

# 1. Định cấu hình Upstream nội mạng Docker (Bảo mật Ports)
upstream nextjs_frontend {
    server frontend_web:3001; # Tên service và expose port trong docker-compose.prod.yml
}

upstream nestjs_backend {
    server backend_api:3000;
}

upstream minio_s3 {
    server minio_prod:9000;
}

upstream minio_console {
    server minio_prod:9001;
}

# 2. Cấu hình HTTP Server Cổng 80 (Tương lai cấu hình thêm 443 SSL Let's Encrypt)
server {
    listen 80;
    server_name fit25.hcmute.edu.vn; # Đổi thành tên miền Của Khoa CNTT

    # ------------------------------------------------------------
    # A. CẤU HÌNH BẮT LUỒNG TRUY CẬP TRANG WEB CHÍNH (NEXTJS Front-End)
    # ------------------------------------------------------------
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Hỗ trợ WebSockets (NextJS HMR)
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Chuyển tiếp IP thật của Client (Tránh Log IP bị đè thành IP Proxy)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # B. CẤU HÌNH API NESTJS BACKEND (Bắt buộc phải chứa gốc /api/)
    # ------------------------------------------------------------
    location /api/ {
        # Giới hạn kích thước Upload File (Cho tính năng Submit Album/Form MinIO)
        client_max_body_size 50M; 
        
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # C. CẤU HÌNH ROUTING TỚI MINIO S3 BUCKET (Static Media)
    # ------------------------------------------------------------
    location /media_storage/ {
        # URL gốc web có chứa /media_storage/ sẽ trỏ thẳng vô Kho S3
        proxy_pass http://minio_s3;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------------------------------------------
    # D. [PRIVATE] CẤU HÌNH TRANG QUẢN TRỊ MINIO CONSOLE (Admin Only)
    # ------------------------------------------------------------
    location /minio-panel/ {
        # Lưu ý: Cổng console này không nên mở Public, 
        # Cần chặn IP/dùng Basic Auth cho thực tế Production.
        proxy_pass http://minio_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tính năng Bảo mật Phụ: Ẩn thông tin phiên bản Nginx
    server_tokens off;
}
