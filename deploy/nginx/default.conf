# CẤU HÌNH NGINX LÀM REVERSE PROXY TÁCH BIỆT FRONTEND VÀ BACKEND

# Cache zone cho ảnh/media — 1GB, inactive 30 ngày
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m max_size=1g inactive=30d use_temp_path=off;

# 1. Định cấu hình Upstream nội mạng Docker
upstream nextjs_frontend {
    server frontend_web:3001; 
}

upstream nestjs_backend {
    server backend_api:3000;
}

upstream minio_s3 {
    server minio_prod:9000;
}

upstream minio_console {
    server minio_prod:9001;
}

# ------------------------------------------------------------
# A. SERVER TRANG CHỦ (FRONTEND NEXTJS)
# Domain: 25nam.fit.hcmute.edu.vn
# ------------------------------------------------------------
server {
    listen 80;
    server_name 25nam.fit.hcmute.edu.vn; 

    location /media_storage/ {
        limit_except GET HEAD {
            deny all;
        }

        # Cache ảnh tại Nginx — giảm tải MinIO
        proxy_cache media_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=2592000, immutable";

        proxy_pass http://minio_s3/;
        proxy_http_version 1.1;
        proxy_set_header Host minio-prod:9000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Hỗ trợ WebSockets (NextJS HMR)
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Chuyển tiếp IP thật của Client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    server_tokens off;
}

# ------------------------------------------------------------
# B. SERVER API BACKEND (NESTJS) & MINIO
# Domain: api25nam.fit.hcmute.edu.vn
# ------------------------------------------------------------
server {
    listen 80;
    server_name api25nam.fit.hcmute.edu.vn; 

    # Route tới NestJS API 
    location / {
        client_max_body_size 50M; 
        
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CẤU HÌNH ROUTING TỚI MINIO S3 BUCKET (Static Media)
    # Chỉ cho phép đọc — chặn upload/delete trực tiếp qua Nginx
    location /media_storage/ {
        limit_except GET HEAD {
            deny all;
        }

        # Cache ảnh tại Nginx — giảm tải MinIO
        proxy_cache media_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=2592000, immutable";

        proxy_pass http://minio_s3/;
        proxy_http_version 1.1;
        proxy_set_header Host minio-prod:9000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # [PRIVATE] CẤU HÌNH TRANG QUẢN TRỊ MINIO CONSOLE
    # Chỉ cho phép truy cập từ mạng nội bộ hoặc có basic auth
    location /minio-panel/ {
        # IP whitelist — chỉ mạng nội bộ trường được vào
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://minio_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    server_tokens off;
}
