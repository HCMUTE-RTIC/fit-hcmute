name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main

jobs:
  # ----------------------------------------------------
  # 1. CI: Chạy cho cả 2 nhánh (develop, main)
  # ----------------------------------------------------
  ci:
    name: Continuous Integration (Build)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # (Tùy chọn) Install pnpm & Node.js nếu trên con self-hosted runner chưa cài sẵn.
      # Nếu ubuntu của bạn cài sẵn node và pnpm rồi thì có thể comment 2 step này đi.
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Restore Next.js and Turbo Cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            client/apps/web/.next/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install

      - name: Build Server
        run: cd server && pnpm run build

      - name: Build Web Client
        run: cd client/apps/web && pnpm run build

  # ----------------------------------------------------
  # 2. CD: Chỉ chạy trên `main` VÀ sau khi `ci` thành công
  # ----------------------------------------------------
  cd:
    name: Continuous Deployment
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Deploy via Docker Compose
        run: |
          # 1. Tự động build file image mới nhất từ nhánh `main` 
          # Lưu ý: docker-compose.prod.yml cần định nghĩa `build: ./client/apps/web` thay vì chỉ có image
          # Dựa vào file prod, giả sử ta cần build lại
          docker-compose -f docker-compose.prod.yml build backend_api frontend_web
          
          # 2. Khởi động lại toàn bộ container với cờ -d (chạy ngầm)
          # Tự động thay thế container cũ rác zero-downtime nhất có thể
          docker-compose -f docker-compose.prod.yml up -d
