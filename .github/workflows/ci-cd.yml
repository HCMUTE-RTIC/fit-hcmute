name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main

jobs:
  # ----------------------------------------------------
  # 1. CI: Chạy cho cả 2 nhánh (develop, main)
  # ----------------------------------------------------
  ci:
    name: Continuous Integration (Build)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        run: npm install -g pnpm@10

      - name: Restore Next.js and Turbo Cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            client/apps/web/.next/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Server Dependencies
        run: cd server && pnpm install

      - name: Install Client Dependencies
        run: cd client/apps/web && pnpm install

      - name: Generate Prisma Client
        run: cd server && pnpm exec prisma generate

      - name: Build Server
        run: cd server && pnpm run build

      - name: Build Web Client
        run: cd client/apps/web && pnpm run build

  # ----------------------------------------------------
  # 2. CD: Chỉ chạy trên `main` VÀ sau khi `ci` thành công
  # ----------------------------------------------------
  cd:
    name: Continuous Deployment
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Deploy via Docker Compose
        run: |
          # 1. Copy file cấu hình .env.production từ bên ngoài Server (Host) vào Repository
          # Giúp tách biệt dữ liệu nhạy cảm khỏi Github 
          echo "Sao chép cấu hình .env từ VPS..."
          cp /home/sysadmin/env/.env.production ./.env.production
          cp /home/sysadmin/env/server/.env.production ./server/.env.production
          cp /home/sysadmin/env/client/.env.production ./client/apps/web/.env.production
          
          # 2. Tự động build file image mới nhất từ nhánh `main` 
          # Lưu ý: docker-compose.prod.yml cần định nghĩa `build: ./client/apps/web` thay vì chỉ có image
          # Dựa vào file prod, giả sử ta cần build lại
          docker compose -f docker-compose.prod.yml build backend_api frontend_web
          
          # 3. Khởi động lại toàn bộ container với cờ -d (chạy ngầm)
          # Tự động thay thế container cũ rác zero-downtime nhất có thể
          docker compose -f docker-compose.prod.yml up -d
