# ==============================================================================
# MÔI TRƯỜNG PHÁT TRIỂN (LOCAL DEVELOPMENT) DÀNH CHO TEAM DEV
# ==============================================================================
# Môi trường này expose dải PORT ra ngoài cho phép developer dùng DataGrip/DBeaver 
# để soi Database thẳng trên máy cá nhân mà không bị tường lửa chặn.
# Lệnh chạy: docker-compose -f docker-compose.dev.yml up -d

services:
  # 1. POSTGRES SQL (Database Core)
  postgres_dev:
    image: postgres:16-alpine
    container_name: m_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hcmute_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-fit_25years_dev}
    ports:
      - "5432:5432" # Mở port Dev
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - fit_hcmute_dev_network

  # 2. REDIS (Caching & Message Queue)
  redis_dev:
    image: redis:7-alpine
    container_name: m_redis_dev
    restart: always
    command: redis-server --requirepass dev_redis_pass_123
    ports:
      - "6379:6379" # Mở port Dev
    volumes:
      - redis_data_dev:/data
    networks:
      - fit_hcmute_dev_network

  # 3. MINIO (S3 Object Storage)
  minio_dev:
    image: minio/minio:latest
    container_name: m_minio_dev
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin_minio_1234}
      MINIO_DOMAIN: localhost
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web Console Port
    volumes:
      - minio_data_dev:/data
    networks:
      fit_hcmute_dev_network:
        aliases:
          - minio-dev

  # 4. MINIO CLIENT (Script Tự động tạo Bucket khi MinIO vừa khởi động xong)
  create_bucket_dev:
    image: minio/mc
    container_name: m_minio_mc_dev
    depends_on:
      - minio_dev
    entrypoint: >
      /bin/sh -c " sleep 5; /usr/bin/mc alias set myminio http://minio-dev:9000 admin_minio admin_minio_1234; /usr/bin/mc mb myminio/fit-25-media-dev || true; /usr/bin/mc anonymous set public myminio/fit-25-media-dev || true; exit 0; "
    networks:
      - fit_hcmute_dev_network

  # 5. UMAMI ANALYTICS (Self-hosted)
  umami_dev:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: m_umami_dev
    restart: always
    depends_on:
      - postgres_dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hcmute_dev}:${POSTGRES_PASSWORD:-admin123}@postgres_dev:5432/umami
      APP_SECRET: dev_umami_secret_123
    ports:
      - "3002:3000" # Umami Dashboard: http://localhost:3002
    networks:
      - fit_hcmute_dev_network

volumes:
  pg_data_dev:
  redis_data_dev:
  minio_data_dev:


networks:
  fit_hcmute_dev_network:
    driver: bridge
